<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060A"/>
      <stop offset="100%" stop-color="#0B0F1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7DF9FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7DF9FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- grid -->
  <g stroke="#7DF9FF" stroke-opacity="0.06" stroke-width="1">
    <g>
      <line x1="0" y1="0" x2="1200" y2="0"/>
      <line x1="0" y1="60" x2="1200" y2="60"/>
      <line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="180" x2="1200" y2="180"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="360" x2="1200" y2="360"/>
      <line x1="0" y1="420" x2="1200" y2="420"/>
      <line x1="0" y1="480" x2="1200" y2="480"/>
      <line x1="0" y1="540" x2="1200" y2="540"/>
      <line x1="0" y1="600" x2="1200" y2="600"/>
    </g>
  </g>

  <!-- crystal -->
  <g transform="translate(900,315)" stroke="#7DF9FF" fill="none" stroke-width="2">
    <polygon points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80" stroke-opacity="0.9"/>
    <polygon points="0,-100 86,-50 86,50 0,100 -86,50 -86,-50" stroke="#A78BFA" stroke-opacity="0.7"/>
    <circle r="40" fill="url(#accent)" opacity="0.85"/>
  </g>

  <!-- text -->
  <text x="80" y="220" font-family="JetBrains Mono, monospace" font-size="22" fill="#7DF9FF" letter-spacing="6">// SHUBH.OS · v1.0</text>
  <text x="78" y="340" font-family="Space Grotesk, sans-serif" font-size="86" font-weight="700" fill="#E5E7EB">ARCHITECT OF</text>
  <text x="78" y="430" font-family="Space Grotesk, sans-serif" font-size="86" font-weight="700" fill="url(#accent)">INTELLIGENT SYSTEMS</text>
  <text x="80" y="500" font-family="JetBrains Mono, monospace" font-size="22" fill="#9CA3AF">compilers · ai interfaces · developer tools</text>
</svg>
